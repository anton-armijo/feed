name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    name: gdlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install godot-gdscript-toolkit
        run: pip install --user gdtoolkit

      - name: Run gdlint
        run: gdlint net/ player/ scripts/ tests/

  test:
    name: gdUnit4
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Run gdUnit4 tests
        uses: godot-gdunit-labs/gdUnit4-action@v1.3.1
        with:
          godot-version: "4.6"
          godot-status: "stable"
          paths: tests/
